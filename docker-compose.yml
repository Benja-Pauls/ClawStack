services:
  postgres:
    image: postgres:16-alpine
    container_name: serpentstack-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-serpentstack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-serpentstack}
      POSTGRES_DB: ${POSTGRES_DB:-serpentstack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-serpentstack} -d ${POSTGRES_DB:-serpentstack}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - serpentstack-network

  redis:
    image: redis:7-alpine
    container_name: serpentstack-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - serpentstack-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: serpentstack-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-serpentstack}:${POSTGRES_PASSWORD:-serpentstack}@postgres:5432/${POSTGRES_DB:-serpentstack}
      RATE_LIMIT_STORAGE_URI: redis://redis:6379
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - serpentstack-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: serpentstack-frontend
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - serpentstack-network

volumes:
  postgres_data:
    driver: local

networks:
  serpentstack-network:
    driver: bridge
