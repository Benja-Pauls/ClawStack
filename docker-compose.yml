services:
  postgres:
    image: postgres:16-alpine
    container_name: clawstack-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clawstack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clawstack}
      POSTGRES_DB: ${POSTGRES_DB:-clawstack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clawstack} -d ${POSTGRES_DB:-clawstack}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - clawstack-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clawstack-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-clawstack}:${POSTGRES_PASSWORD:-clawstack}@postgres:5432/${POSTGRES_DB:-clawstack}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - clawstack-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: clawstack-frontend
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - clawstack-network

volumes:
  postgres_data:
    driver: local

networks:
  clawstack-network:
    driver: bridge
