[alembic]
# Path to migration scripts.
script_location = migrations

# Template used to generate migration file names.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Truncate long revision identifiers in filenames.
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command.
revision_environment = false

# Set to 'true' to allow .hierarchyid in migration filenames.
sourceless = false

# Version path separator; default is "os".
version_path_separator = os

# sqlalchemy.url is loaded from environment in migrations/env.py
# This placeholder is overridden at runtime.
sqlalchemy.url = postgresql://localhost/serpentstack

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
