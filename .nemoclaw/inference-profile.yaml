# NemoClaw Inference Profile
# Controls model selection, context management, and privacy settings

inference:
  default_model: nemotron-coder
  fallback_model: nemotron-70b
  context_window: 32768

  # Model selection per task type
  routing:
    code_generation:
      model: nemotron-coder
      temperature: 0.2
      max_tokens: 4096
    code_review:
      model: nemotron-coder
      temperature: 0.1
      max_tokens: 2048
    planning:
      model: nemotron-70b
      temperature: 0.4
      max_tokens: 8192
    error_analysis:
      model: nemotron-coder
      temperature: 0.1
      max_tokens: 2048
    documentation:
      model: nemotron-70b
      temperature: 0.3
      max_tokens: 4096

  # Generation parameters
  defaults:
    temperature: 0.2
    top_p: 0.95
    top_k: 40
    repeat_penalty: 1.1
    stop_sequences: ["```\n\n", "---END---"]

context:
  # How to manage the context window
  strategy: sliding_window
  # Reserve tokens for the response
  response_reserve: 4096
  # Priority for context inclusion (higher = included first)
  priority:
    - source: current_file
      weight: 100
    - source: error_output
      weight: 95
    - source: skill_instructions
      weight: 90
    - source: related_files
      weight: 70
    - source: git_diff
      weight: 60
    - source: project_structure
      weight: 40

privacy:
  # All inference runs locally -- no data leaves the machine
  telemetry: false
  local_inference_only: true
  # Do not send code to external APIs
  external_api_calls: false
  # Do not log prompts or completions to disk in production
  log_prompts: false
  log_completions: false
  # Wipe context between sessions
  session_isolation: true

performance:
  # Batch size for local inference
  batch_size: 1
  # Number of GPU layers to offload (0 = CPU only)
  gpu_layers: -1  # auto-detect
  # Threading for CPU inference
  threads: 4
  # Cache quantized model weights
  cache_quantized: true
  cache_dir: "${HOME}/.nemoclaw/model-cache"
