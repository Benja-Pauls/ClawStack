# NemoClaw OpenShell Sandbox Configuration
# Controls the execution environment for AI agent operations

sandbox:
  mode: isolated
  description: >
    Restricts agent execution to the project directory with controlled
    network access. Prevents accidental modifications outside the workspace.

filesystem:
  # Root directory the agent can access
  root: "${PROJECT_DIR}"
  # Writable paths (relative to root)
  writable:
    - "."
  # Explicitly blocked paths
  blocked:
    - "/etc"
    - "/var"
    - "/usr"
    - "/System"
    - "${HOME}/.ssh"
    - "${HOME}/.aws/credentials"
    - "${HOME}/.config"
  # Temp directory for agent scratch space
  temp_dir: "${PROJECT_DIR}/.nemoclaw/tmp"

network:
  # Default policy for outbound connections
  default: deny
  allow:
    # Local development servers
    - host: "localhost"
      ports: [3000, 5173, 8000, 5432]
    - host: "127.0.0.1"
      ports: [3000, 5173, 8000, 5432]
    # Package registries
    - host: "registry.npmjs.org"
      ports: [443]
    - host: "pypi.org"
      ports: [443]
    - host: "files.pythonhosted.org"
      ports: [443]
    # Docker Hub for base images
    - host: "registry-1.docker.io"
      ports: [443]
    - host: "auth.docker.io"
      ports: [443]
    - host: "production.cloudflare.docker.com"
      ports: [443]
  block:
    # Catch-all for anything not explicitly allowed
    - host: "*"
      reason: "External network access is blocked by default"

resources:
  memory:
    limit: "4GB"
    swap: "1GB"
  cpu:
    cores: 4
    max_percent: 80
  processes:
    max: 64
  disk:
    max_write_mb_per_sec: 100
    max_total_write_gb: 10

timeouts:
  # Max time for a single command execution
  command: 300s
  # Max time for the entire agent session
  session: 3600s
  # Idle timeout before the sandbox is torn down
  idle: 600s

logging:
  level: info
  output: "${PROJECT_DIR}/.nemoclaw/logs/sandbox.log"
  max_size: "50MB"
  rotate: 3
