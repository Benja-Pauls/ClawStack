name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clawstack
          POSTGRES_PASSWORD: clawstack
          POSTGRES_DB: clawstack
        ports:
          - 5432:5432
        options: >-
          --health-cmd '["pg_isready", "-U", "clawstack", "-d", "clawstack"]'
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://clawstack:clawstack@localhost:5432/clawstack
      ENVIRONMENT: test
      SECRET_KEY: test-secret-key

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Lint (ruff format)
        run: uv run ruff format --check .

      - name: Type check
        run: uv run python -c "import app.main"

      - name: Run tests
        run: uv run pytest --tb=short -q

  frontend:
    name: Frontend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint (ESLint)
        run: npx eslint src/

      - name: Run tests
        run: npm test
