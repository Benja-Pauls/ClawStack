name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:  # Allow deploy.yml to run CI as a prerequisite

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      ENVIRONMENT: test
      SECRET_KEY: test-secret-key-ci-only

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Lint (ruff format)
        run: uv run ruff format --check .

      - name: Type check
        run: uv run python -c "import app.main"

      - name: Run tests
        run: uv run pytest --tb=short -q

  frontend:
    name: Frontend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint (ESLint)
        run: npx eslint src/

      - name: Run tests
        run: npm test

  cli:
    name: CLI (smoke tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run CLI smoke tests
        run: node --test cli/test/cli.test.js

  init-script:
    name: Init script tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Run init tests
        run: python -m pytest tests/test_init.py -v

  infra:
    name: Infrastructure validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra/

      - name: Validate Terraform syntax (root module)
        working-directory: infra
        run: |
          # Init with a local backend just for validation (no real S3 needed)
          terraform init -backend=false
          terraform validate
